<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>廚師端 - 訂單管理</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: "Noto Sans TC", Arial, sans-serif; background: #1a252f; color: #ecf0f1; min-height: 100vh; }
    header {
      background: #16212b;
      padding: 16px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 2px solid #1abc9c;
    }
    header h1 { font-size: 1.4rem; color: #1abc9c; }
    header a { color: #aaa; text-decoration: none; font-size: 0.9rem; }
    .container { max-width: 1000px; margin: 0 auto; padding: 24px 16px; }

    .stats {
      display: flex;
      gap: 12px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }
    .stat-box {
      background: #2c3e50;
      border-radius: 10px;
      padding: 16px 24px;
      flex: 1;
      min-width: 120px;
      text-align: center;
    }
    .stat-box .num { font-size: 2rem; font-weight: bold; color: #1abc9c; }
    .stat-box .label { font-size: 0.8rem; color: #aaa; margin-top: 4px; }

    .filter-row { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
    .filter-btn {
      padding: 7px 16px;
      border: 1px solid #444;
      border-radius: 20px;
      background: transparent;
      color: #ccc;
      cursor: pointer;
      font-size: 0.85rem;
      transition: all 0.2s;
    }
    .filter-btn.active, .filter-btn:hover {
      background: #1abc9c;
      border-color: #1abc9c;
      color: white;
    }

    .order-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 16px; }

    .order-card {
      background: #2c3e50;
      border-radius: 12px;
      padding: 18px;
      border-left: 4px solid #555;
      transition: transform 0.15s;
    }
    .order-card:hover { transform: translateY(-2px); }
    .order-card.待處理 { border-left-color: #f39c12; }
    .order-card.製作中 { border-left-color: #3498db; }
    .order-card.已完成 { border-left-color: #1abc9c; }
    .order-card.已取消 { border-left-color: #e74c3c; }

    .card-header { display: flex; justify-content: space-between; margin-bottom: 10px; }
    .order-id { font-size: 0.8rem; color: #aaa; }
    .order-time { font-size: 0.75rem; color: #888; }
    .customer { font-size: 1.1rem; font-weight: bold; margin-bottom: 4px; }
    .item { color: #1abc9c; margin-bottom: 2px; }
    .price { font-size: 0.85rem; color: #aaa; margin-bottom: 14px; }

    .status-select {
      width: 100%;
      padding: 8px 12px;
      background: #1a252f;
      border: 1px solid #444;
      border-radius: 8px;
      color: #ecf0f1;
      font-size: 0.9rem;
      cursor: pointer;
    }
    .status-select:focus { outline: none; border-color: #1abc9c; }

    .empty-msg { text-align: center; padding: 60px; color: #555; grid-column: 1/-1; }

    #toast {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
      background: #1abc9c; color: white;
      padding: 12px 24px; border-radius: 8px;
      font-size: 0.9rem; opacity: 0;
      transition: opacity 0.3s;
      z-index: 999;
    }
    #toast.show { opacity: 1; }
  </style>
</head>
<body>
<header>
  <h1>👨‍🍳 廚師端－訂單管理</h1>
  <a href="/">← 回顧客點餐頁</a>
</header>

<div class="container">
  <div class="stats">
    <div class="stat-box"><div class="num" id="cnt-all">0</div><div class="label">全部訂單</div></div>
    <div class="stat-box"><div class="num" id="cnt-待處理" style="color:#f39c12">0</div><div class="label">待處理</div></div>
    <div class="stat-box"><div class="num" id="cnt-製作中" style="color:#3498db">0</div><div class="label">製作中</div></div>
    <div class="stat-box"><div class="num" id="cnt-已完成" style="color:#1abc9c">0</div><div class="label">已完成</div></div>
  </div>

  <div class="filter-row">
    <button class="filter-btn active" onclick="setFilter('全部', this)">全部</button>
    <button class="filter-btn" onclick="setFilter('待處理', this)">待處理</button>
    <button class="filter-btn" onclick="setFilter('製作中', this)">製作中</button>
    <button class="filter-btn" onclick="setFilter('已完成', this)">已完成</button>
    <button class="filter-btn" onclick="setFilter('已取消', this)">已取消</button>
  </div>

  <div class="order-grid" id="order-grid">
    <p class="empty-msg">載入中...</p>
  </div>
</div>

<div id="toast"></div>

<script>
  let allOrders = [];
  let currentFilter = "全部";

  async function loadOrders() {
    const res = await fetch("/api/orders");
    allOrders = await res.json();
    updateStats();
    renderOrders();
  }

  function updateStats() {
    document.getElementById("cnt-all").textContent = allOrders.length;
    ["待處理", "製作中", "已完成"].forEach(s => {
      document.getElementById(`cnt-${s}`).textContent = allOrders.filter(o => o.status === s).length;
    });
  }

  function setFilter(f, btn) {
    currentFilter = f;
    document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    renderOrders();
  }

  function renderOrders() {
    const filtered = currentFilter === "全部" ? allOrders : allOrders.filter(o => o.status === currentFilter);
    const grid = document.getElementById("order-grid");

    if (filtered.length === 0) {
      grid.innerHTML = `<p class="empty-msg">沒有${currentFilter === "全部" ? "" : currentFilter + "的"}訂單</p>`;
      return;
    }

    grid.innerHTML = filtered.map(o => `
      <div class="order-card ${o.status}">
        <div class="card-header">
          <span class="order-id">#${o.id}</span>
          <span class="order-time">${o.created_at.slice(0, 16).replace("T", " ")}</span>
        </div>
        <div class="customer">👤 ${o.customer_name}</div>
        <div class="item">🍽 ${o.item_name} × ${o.quantity}</div>
        <div class="price">合計：$${o.total_price}</div>
        <select class="status-select" onchange="updateStatus(${o.id}, this.value)">
          <option value="待處理" ${o.status === "待處理" ? "selected" : ""}>⏳ 待處理</option>
          <option value="製作中" ${o.status === "製作中" ? "selected" : ""}>🔥 製作中</option>
          <option value="已完成" ${o.status === "已完成" ? "selected" : ""}>✅ 已完成</option>
          <option value="已取消" ${o.status === "已取消" ? "selected" : ""}>❌ 已取消</option>
        </select>
      </div>
    `).join("");
  }

  async function updateStatus(id, status) {
    const res = await fetch(`/api/orders/${id}`, {
      method: "PATCH",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ status })
    });
    if (res.ok) {
      showToast(`✅ 訂單 #${id} 已更新為「${status}」`);
      loadOrders();
    }
  }

  function showToast(msg) {
    const t = document.getElementById("toast");
    t.textContent = msg;
    t.classList.add("show");
    setTimeout(() => t.classList.remove("show"), 2500);
  }

  loadOrders();
  setInterval(loadOrders, 8000);
</script>
</body>
</html>
