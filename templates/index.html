<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>線上訂餐系統</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "Noto Sans TC", Arial, sans-serif;
      background: #f5f5f5;
      color: #333;
    }
    header {
      background: #2c3e50;
      color: white;
      padding: 16px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    header h1 { font-size: 1.4rem; }
    header a {
      color: #1abc9c;
      text-decoration: none;
      font-size: 0.9rem;
      border: 1px solid #1abc9c;
      padding: 6px 12px;
      border-radius: 6px;
    }
    .container { max-width: 900px; margin: 0 auto; padding: 24px 16px; }

    /* 下訂單區塊 */
    .order-form {
      background: white;
      border-radius: 12px;
      padding: 24px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      margin-bottom: 32px;
    }
    .order-form h2 { margin-bottom: 16px; font-size: 1.1rem; color: #2c3e50; }
    .form-row { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 12px; }
    .form-row input, .form-row select {
      flex: 1;
      min-width: 160px;
      padding: 10px 14px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 0.95rem;
    }
    .form-row input:focus, .form-row select:focus {
      outline: none;
      border-color: #1abc9c;
    }
    .quantity-row { display: flex; gap: 12px; align-items: center; }
    .quantity-row input[type=number] { width: 80px; flex: none; }
    #price-preview {
      font-size: 1rem;
      color: #e74c3c;
      font-weight: bold;
      min-width: 100px;
    }
    .btn {
      padding: 10px 24px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.95rem;
      font-weight: bold;
      transition: opacity 0.2s;
    }
    .btn:hover { opacity: 0.85; }
    .btn-primary { background: #1abc9c; color: white; }
    .btn-danger  { background: #e74c3c; color: white; padding: 6px 14px; font-size: 0.85rem; }

    /* toast 通知 */
    #toast {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
      background: #2c3e50; color: white;
      padding: 12px 24px; border-radius: 8px;
      font-size: 0.9rem; opacity: 0;
      transition: opacity 0.3s;
      z-index: 999;
    }
    #toast.show { opacity: 1; }

    /* 訂單列表 */
    .orders-section h2 { margin-bottom: 16px; font-size: 1.1rem; color: #2c3e50; }
    table {
      width: 100%;
      background: white;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      border-collapse: collapse;
    }
    th {
      background: #2c3e50;
      color: white;
      padding: 12px 14px;
      text-align: left;
      font-size: 0.9rem;
    }
    td { padding: 12px 14px; border-bottom: 1px solid #f0f0f0; font-size: 0.9rem; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #fafafa; }

    .badge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 0.8rem;
      font-weight: bold;
    }
    .badge-待處理 { background: #ffeaa7; color: #d35400; }
    .badge-製作中 { background: #dfe6e9; color: #2d3436; }
    .badge-已完成 { background: #d5f5e3; color: #1e8449; }
    .badge-已取消 { background: #fadbd8; color: #c0392b; }

    .empty-msg { text-align: center; padding: 40px; color: #aaa; }
  </style>
</head>
<body>
<header>
  <h1>🍜 線上訂餐系統</h1>
  <a href="/kitchen">廚師端 →</a>
</header>

<div class="container">
  <!-- 下訂單 -->
  <div class="order-form">
    <h2>📝 下訂單</h2>
    <div class="form-row">
      <input type="text" id="customer-name" placeholder="你的姓名（必填）">
      <select id="menu-select">
        <option value="">選擇餐點...</option>
      </select>
    </div>
    <div class="form-row quantity-row">
      <input type="number" id="quantity" value="1" min="1" max="99">
      <span id="price-preview">請選擇餐點</span>
      <button class="btn btn-primary" onclick="submitOrder()">送出訂單</button>
    </div>
  </div>

  <!-- 訂單列表 -->
  <div class="orders-section">
    <h2>📋 所有訂單</h2>
    <table>
      <thead>
        <tr>
          <th>#</th>
          <th>顧客</th>
          <th>餐點</th>
          <th>數量</th>
          <th>金額</th>
          <th>狀態</th>
          <th>時間</th>
          <th>操作</th>
        </tr>
      </thead>
      <tbody id="order-list">
        <tr><td colspan="8" class="empty-msg">載入中...</td></tr>
      </tbody>
    </table>
  </div>
</div>

<div id="toast"></div>

<script>
  let menuData = [];

  async function loadMenu() {
    const res = await fetch("/api/menu");
    menuData = await res.json();
    const sel = document.getElementById("menu-select");
    menuData.forEach(item => {
      const opt = document.createElement("option");
      opt.value = item.id;
      opt.textContent = `${item.name}（$${item.price}）`;
      opt.dataset.price = item.price;
      opt.dataset.name = item.name;
      sel.appendChild(opt);
    });
  }

  document.getElementById("menu-select").addEventListener("change", updatePrice);
  document.getElementById("quantity").addEventListener("input", updatePrice);

  function updatePrice() {
    const sel = document.getElementById("menu-select");
    const qty = parseInt(document.getElementById("quantity").value) || 1;
    const opt = sel.options[sel.selectedIndex];
    if (!opt || !opt.dataset.price) {
      document.getElementById("price-preview").textContent = "請選擇餐點";
      return;
    }
    const total = opt.dataset.price * qty;
    document.getElementById("price-preview").textContent = `合計：$${total}`;
  }

  async function submitOrder() {
    const name = document.getElementById("customer-name").value.trim();
    const sel = document.getElementById("menu-select");
    const qty = parseInt(document.getElementById("quantity").value);
    const opt = sel.options[sel.selectedIndex];

    if (!name) return showToast("請輸入姓名！");
    if (!opt || !opt.dataset.name) return showToast("請選擇餐點！");
    if (!qty || qty < 1) return showToast("數量至少為 1！");

    const total = opt.dataset.price * qty;
    const res = await fetch("/api/orders", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        customer_name: name,
        item_name: opt.dataset.name,
        quantity: qty,
        total_price: total
      })
    });

    if (res.ok) {
      showToast("✅ 訂單送出成功！");
      document.getElementById("customer-name").value = "";
      document.getElementById("menu-select").value = "";
      document.getElementById("quantity").value = 1;
      document.getElementById("price-preview").textContent = "請選擇餐點";
      loadOrders();
    } else {
      showToast("❌ 送出失敗，請再試一次");
    }
  }

  async function deleteOrder(id) {
    if (!confirm("確定要刪除這筆訂單？")) return;
    await fetch(`/api/orders/${id}`, { method: "DELETE" });
    showToast("🗑️ 訂單已刪除");
    loadOrders();
  }

  async function loadOrders() {
    const res = await fetch("/api/orders");
    const orders = await res.json();
    const tbody = document.getElementById("order-list");

    if (orders.length === 0) {
      tbody.innerHTML = `<tr><td colspan="8" class="empty-msg">目前還沒有訂單</td></tr>`;
      return;
    }

    tbody.innerHTML = orders.map(o => `
      <tr>
        <td>#${o.id}</td>
        <td>${o.customer_name}</td>
        <td>${o.item_name}</td>
        <td>${o.quantity}</td>
        <td>$${o.total_price}</td>
        <td><span class="badge badge-${o.status}">${o.status}</span></td>
        <td>${o.created_at.slice(0, 16).replace("T", " ")}</td>
        <td><button class="btn btn-danger" onclick="deleteOrder(${o.id})">刪除</button></td>
      </tr>
    `).join("");
  }

  function showToast(msg) {
    const t = document.getElementById("toast");
    t.textContent = msg;
    t.classList.add("show");
    setTimeout(() => t.classList.remove("show"), 2500);
  }

  loadMenu();
  loadOrders();
  setInterval(loadOrders, 10000); // 每10秒自動刷新
</script>
</body>
</html>
